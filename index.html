<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCF Sizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>VCF Sizer</h1>
            <p class="subtitle">Outil de sizing pour VMware Cloud Foundation</p>
        </div>
    </header>

    <main class="container">
        <!-- Environment definition (always visible above tabs) -->
        <section id="env-section">
            <div class="section-header" id="env-header">
                <h2>Définition de l'environnement</h2>
                <button class="btn-collapse" id="env-toggle" title="Réduire">&#9650;</button>
            </div>
            <div id="env-body">
                <div id="domain-cards"></div>
                <button class="btn-secondary" id="add-domain-btn">+ Ajouter un Workload Domain</button>
            </div>
        </section>

        <!-- Tab navigation -->
        <nav class="tabs" id="main-tabs">
            <button class="tab active" data-tab="summary">Synthèse</button>
            <button class="tab" data-tab="nsx-edge">NSX Edge</button>
            <button class="tab" data-tab="nsx-manager">NSX Manager</button>
            <button class="tab" data-tab="vcenter">vCenter Server</button>
            <button class="tab" data-tab="vcf-operations">VCF Operations</button>
            <button class="tab" data-tab="aria-automation">Aria Automation</button>
            <button class="tab" data-tab="sddc-manager">SDDC Manager</button>
        </nav>

        <!-- Tab content (rendered by app.js) -->
        <div id="tab-content"></div>
    </main>

    <footer>
        <div class="container">
            <p>VCF Sizer — Outil open source de sizing VMware Cloud Foundation</p>
        </div>
    </footer>

    <script src="js/sizing-rules.js"></script>
    <script src="js/domain-manager.js"></script>
    <script src="js/nsx-edge-calculator.js"></script>
    <script src="js/product-calculators.js"></script>
    <script src="js/recommendations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
